name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest -q

      - name: Validate sample
        run: hal-rc validate samples/chip_001.json --workloads samples/workloads.json --constraints samples/constraints.json

      - name: Compile, self-check, and compare
        run: hal-rc compile samples/chip_001.json --workloads samples/workloads.json --constraints samples/constraints.json --out artifacts/ci_chip --self-check --comparison-report

      - name: Verify generated artifacts
        run: hal-rc verify-artifacts artifacts/ci_chip --chip samples/chip_001.json --workloads samples/workloads.json --constraints samples/constraints.json

      - name: Compare baselines
        run: hal-rc compare-baselines samples/chip_001.json --workloads samples/workloads.json --constraints samples/constraints.json --out artifacts/ci_comparison

